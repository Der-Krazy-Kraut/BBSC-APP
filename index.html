<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beer Belly Social Club - Tasting</title>
    <!-- Phosphor Icons (Flache, professionelle Icons) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* === DESIGN & FARBEN === */
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --accent-blue: #AEC6CF; /* Pastellblau */
            --accent-dark: #81a4b1;
            --text-light: #ffffff;
            --text-muted: #9e9e9e;
            --success: #4caf50;
            --danger: #f44336;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body { background-color: var(--bg-dark); color: var(--text-light); padding-bottom: 80px; }

        /* === HEADER === */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background-color: var(--card-bg);
            border-bottom: 1px solid #333;
        }
        .profile-trigger {
            display: flex; align-items: center; gap: 8px; color: var(--accent-blue);
            font-weight: bold; cursor: pointer; padding: 5px 10px; border-radius: 8px;
            background: rgba(174, 198, 207, 0.1);
        }
        .logo { height: 40px; }

        /* === BEREICHE & SCREENS === */
        .screen { display: none; padding: 20px; }
        .screen.active { display: block; }

        /* === LOGIN & WARTESCHIRM === */
        .auth-container { max-width: 400px; margin: 60px auto; background: var(--card-bg); padding: 30px; border-radius: 12px; text-align: center; }
        .auth-container h2 { margin-bottom: 20px; color: var(--accent-blue); }
        .auth-container input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: white; }
        .btn-primary { width: 100%; padding: 12px; background: var(--accent-blue); color: #000; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-danger { background: var(--danger); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; margin-top: 20px; width: 100%; }
        
        /* === KONTROLLEN (Filter & Ranking) === */
        .controls { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        select { width: 100%; padding: 12px; border-radius: 8px; background: var(--card-bg); color: white; border: 1px solid #333; font-size: 16px; }
        .filter-buttons { display: flex; gap: 10px; }
        .filter-btn { flex: 1; padding: 10px; background: var(--card-bg); border: 1px solid #333; color: var(--text-muted); border-radius: 8px; cursor: pointer; }
        .filter-btn.active { background: var(--accent-blue); color: #000; font-weight: bold; }
        .ranking-btn { flex: 1; padding: 10px; background: linear-gradient(135deg, #ffd700, #daa520); color: #000; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }

        /* === BIER-KARTEN (Feed) === */
        .beer-card { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 15px; border-left: 4px solid var(--accent-blue); }
        .beer-header { display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center; }
        .beer-name { font-size: 18px; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .theme-badge { background: rgba(174, 198, 207, 0.2); color: var(--accent-blue); padding: 3px 8px; border-radius: 12px; font-size: 12px; }
        .beer-meta { display: flex; gap: 15px; color: var(--text-muted); font-size: 14px; margin-bottom: 10px; }
        .beer-meta i { margin-right: 4px; }
        .beer-grade { font-size: 24px; font-weight: bold; text-align: right; }
        
        /* Edit Buttons */
        .edit-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 20px; padding: 5px; border-radius: 5px; }
        .edit-btn:hover { color: var(--accent-blue); background: rgba(255,255,255,0.1); }

        /* === SCHULNOTEN FARBEN === */
        .grade-1 { color: #4caf50; } .grade-2 { color: #8bc34a; } .grade-3 { color: #cddc39; }
        .grade-4 { color: #ffeb3b; } .grade-5 { color: #ff9800; } .grade-6 { color: #f44336; }

        /* === MODALS (Profil, Hinzufügen, Bearbeiten) === */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: flex-end; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: var(--card-bg); width: 100%; max-height: 90vh; overflow-y: auto; border-radius: 20px 20px 0 0; padding: 20px; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .close-modal { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }

        /* === FORMULAR ELEMENTE === */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--accent-blue); }
        .form-group input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: white; }
        .chip-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .chip { padding: 8px 15px; border-radius: 20px; border: 1px solid #444; background: #2a2a2a; color: var(--text-muted); cursor: pointer; }
        .chip.active { background: var(--accent-blue); color: #000; border-color: var(--accent-blue); font-weight: bold; }
        
        /* Slider */
        .slider-container { background: #2a2a2a; padding: 15px; border-radius: 8px; text-align: center; }
        input[type=range] { width: 100%; margin-bottom: 10px; accent-color: var(--accent-blue); }
        #sliderText, #editSliderText { font-weight: bold; color: var(--accent-blue); }

        /* Profil Akkordeon */
        .accordion { background: #2a2a2a; color: white; cursor: pointer; padding: 15px; width: 100%; text-align: left; border: none; border-bottom: 1px solid #444; outline: none; font-size: 16px; transition: 0.4s; display: flex; justify-content: space-between; }
        .accordion.active, .accordion:hover { background: #333; }
        .panel { padding: 0 15px; background-color: var(--card-bg); display: none; overflow: hidden; }

        /* FAB (Floating Action Button) */
        .fab { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: var(--accent-blue); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #000; font-size: 28px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: pointer; z-index: 100; border: none; }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="screen active">
        <div class="auth-container">
            <img src="Logo_BBSC_DD_2024_3.png" alt="Logo" style="height: 80px; margin-bottom: 20px;" onerror="this.style.display='none'">
            <h2>BBSC Login</h2>
            <form id="authForm" novalidate>
                <input type="email" id="email" placeholder="E-Mail" required>
                <input type="password" id="password" placeholder="Passwort (min. 6 Zeichen)" required>
                <button type="submit" class="btn-primary"><i class="ph ph-sign-in"></i> Anmelden / Registrieren</button>
            </form>
            <p id="authError" style="color: var(--danger); margin-top: 10px; display: none;"></p>
        </div>
    </div>

    <!-- WARTESCHIRM (Approval) -->
    <div id="waitScreen" class="screen">
        <div class="auth-container">
            <h2><i class="ph ph-hourglass-high" style="font-size: 40px; color: var(--accent-blue);"></i></h2>
            <h3>Warten auf Freigabe</h3>
            <p style="margin: 15px 0; color: var(--text-muted);">Dein Account wurde angelegt. Ein Admin muss dich freischalten.</p>
            <button id="waitLogoutBtn" class="btn-danger">Ausloggen</button>
        </div>
    </div>

    <!-- HAUPT-APP -->
    <div id="mainApp" class="screen">
        <header>
            <div class="profile-trigger" id="profileBtn">
                <i class="ph ph-user"></i> <span id="headerUserName">Profil</span>
            </div>
            <img src="Logo_BBSC_DD_2024_3.png" alt="BBSC" class="logo" onerror="this.style.display='none'">
        </header>

        <div class="controls">
            <select id="mainThemeSelect">
                <option value="Frankreich (26. Juni)">Frankreich (26. Juni)</option>
                <option value="Allgemeines Tasting">Allgemeines Tasting</option>
            </select>
            <div class="filter-buttons">
                <button class="filter-btn active" id="btnFilterAll">Alle</button>
                <button class="filter-btn" id="btnFilterMine">Meine</button>
                <button class="ranking-btn" id="btnRanking"><i class="ph ph-trophy"></i> Ranking</button>
            </div>
        </div>

        <div id="feed">
            <!-- Biere werden hier geladen -->
        </div>

        <button class="fab" id="addBeerFab"><i class="ph ph-plus"></i></button>
    </div>

    <!-- PROFIL MODAL -->
    <div id="profileModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Mein Profil</h2>
                <button class="close-modal" id="closeProfileModal"><i class="ph ph-x"></i></button>
            </div>
            <div id="profileAccordionContainer"></div>
            <button id="logoutBtn" class="btn-danger" style="margin-top: 30px;"><i class="ph ph-sign-out"></i> Abmelden</button>
        </div>
    </div>

    <!-- RANKING MODAL -->
    <div id="rankingModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="ph ph-trophy" style="color: gold;"></i> Top 3 - <span id="rankingThemeTitle"></span></h2>
                <button class="close-modal" id="closeRankingModal"><i class="ph ph-x"></i></button>
            </div>
            <div id="rankingList"></div>
        </div>
    </div>

    <!-- BIER HINZUFÜGEN MODAL -->
    <div id="addModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Bier eintragen</h2>
                <button class="close-modal" id="closeAddModal"><i class="ph ph-x"></i></button>
            </div>
            <div class="form-group">
                <label>Biername</label>
                <input type="text" id="beerName" placeholder="z.B. Pelforth Blonde">
            </div>
            <div class="form-group">
                <label>Gefäß</label>
                <div class="chip-group" id="containerChips">
                    <div class="chip active" data-val="Flasche">Flasche</div>
                    <div class="chip" data-val="Dose">Dose</div>
                    <div class="chip" data-val="Glas">Glas</div>
                </div>
            </div>
            <div class="form-group">
                <label>Gesamteindruck (0-10)</label>
                <div class="slider-container">
                    <input type="range" id="impressionSlider" min="0" max="10" value="5">
                    <div id="sliderText">5 - Ganz okay</div>
                </div>
            </div>
            <div class="form-group">
                <label>Schulnote (1.0 - 6.0)</label>
                <select id="gradeSelect">
                    <option value="1.0">1.0 - Überragend</option>
                    <option value="1.5">1.5</option>
                    <option value="2.0">2.0 - Gut</option>
                    <option value="2.5">2.5</option>
                    <option value="3.0">3.0 - Befriedigend</option>
                    <option value="3.5">3.5</option>
                    <option value="4.0">4.0 - Ausreichend</option>
                    <option value="4.5">4.5</option>
                    <option value="5.0">5.0 - Mangelhaft</option>
                    <option value="5.5">5.5</option>
                    <option value="6.0">6.0 - Ungenügend</option>
                </select>
            </div>
            <button id="saveBeerBtn" class="btn-primary" style="margin-top: 20px;"><i class="ph ph-check"></i> Speichern</button>
        </div>
    </div>

    <!-- EDIT MODAL (Bearbeiten) -->
    <div id="editModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Bier bearbeiten</h2>
                <button class="close-modal" id="closeEditModal"><i class="ph ph-x"></i></button>
            </div>
            <input type="hidden" id="editDocId">
            <div class="form-group">
                <label>Biername</label>
                <input type="text" id="editBeerName">
            </div>
            <div class="form-group">
                <label>Gesamteindruck (0-10)</label>
                <div class="slider-container">
                    <input type="range" id="editImpressionSlider" min="0" max="10">
                    <div id="editSliderText">5 - Ganz okay</div>
                </div>
            </div>
            <div class="form-group">
                <label>Schulnote (1.0 - 6.0)</label>
                <select id="editGradeSelect">
                    <option value="1.0">1.0 - Überragend</option>
                    <option value="1.5">1.5</option>
                    <option value="2.0">2.0 - Gut</option>
                    <option value="2.5">2.5</option>
                    <option value="3.0">3.0 - Befriedigend</option>
                    <option value="3.5">3.5</option>
                    <option value="4.0">4.0 - Ausreichend</option>
                    <option value="4.5">4.5</option>
                    <option value="5.0">5.0 - Mangelhaft</option>
                    <option value="5.5">5.5</option>
                    <option value="6.0">6.0 - Ungenügend</option>
                </select>
            </div>
            <button id="updateBeerBtn" class="btn-primary" style="margin-top: 20px;"><i class="ph ph-check"></i> Aktualisieren</button>
            <button id="deleteBeerBtn" class="btn-danger" style="margin-top: 10px;"><i class="ph ph-trash"></i> Eintrag löschen</button>
        </div>
    </div>

    <!-- FIREBASE LOGIK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, doc, getDoc, setDoc, query, orderBy, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ==========================================
        // HIER DEINEN FIREBASE SCHLÜSSEL EINFÜGEN!
        // ==========================================
    const firebaseConfig = {
          apiKey: "AIzaSyB2bye9GBhZ_p1gs4qLvIxGemoR9RKYcPc",
          authDomain: "biertasting-bbsc.firebaseapp.com",
          projectId: "biertasting-bbsc",
          storageBucket: "biertasting-bbsc.firebasestorage.app",
          messagingSenderId: "547730661062",
          appId: "1:547730661062:web:ac340d8467ffe5323d41c7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let isAdmin = false; 
        let currentFilter = 'all'; 

        const sliderTexts = {
            0: "0 - Spülwasser", 1: "1 - Kaum trinkbar", 2: "2 - Eher nicht", 3: "3 - Unterer Durchschnitt",
            4: "4 - Trinkbar", 5: "5 - Ganz okay", 6: "6 - Solide", 7: "7 - Lecker",
            8: "8 - Sehr stark", 9: "9 - Herausragend", 10: "10 - Feuchter Traum der GL"
        };

        const impressionSlider = document.getElementById('impressionSlider');
        const sliderText = document.getElementById('sliderText');
        impressionSlider.addEventListener('input', (e) => {
            sliderText.innerText = sliderTexts[e.target.value];
        });

        const editImpressionSlider = document.getElementById('editImpressionSlider');
        const editSliderText = document.getElementById('editSliderText');
        editImpressionSlider.addEventListener('input', (e) => {
            editSliderText.innerText = sliderTexts[e.target.value];
        });

        let selectedContainer = "Flasche";
        document.querySelectorAll('#containerChips .chip').forEach(chip => {
            chip.addEventListener('click', (e) => {
                document.querySelectorAll('#containerChips .chip').forEach(c => c.classList.remove('active'));
                e.target.classList.add('active');
                selectedContainer = e.target.getAttribute('data-val');
            });
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userDocRef = doc(db, "users", user.uid);
                const userDoc = await getDoc(userDocRef);
                
                if (userDoc.exists()) {
                    if (userDoc.data().approved === true) {
                        isAdmin = userDoc.data().isAdmin === true; 
                        document.getElementById('headerUserName').innerText = user.email.split('@')[0];
                        showScreen('mainApp');
                        loadBeers();
                    } else {
                        showScreen('waitScreen');
                    }
                } else {
                    await setDoc(userDocRef, { email: user.email, approved: false, isAdmin: false });
                    showScreen('waitScreen');
                }
            } else {
                showScreen('loginScreen');
            }
        });

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('authError');
            
            try {
                await signInWithEmailAndPassword(auth, email, password);
                errorMsg.style.display = 'none';
            } catch (error) {
                if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
                    try {
                        await createUserWithEmailAndPassword(auth, email, password);
                        errorMsg.style.display = 'none';
                    } catch (regError) {
                        errorMsg.innerText = "Fehler: " + regError.message;
                        errorMsg.style.display = 'block';
                    }
                } else {
                    errorMsg.innerText = "Fehler: " + error.message;
                    errorMsg.style.display = 'block';
                }
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));
        document.getElementById('waitLogoutBtn').addEventListener('click', () => signOut(auth));

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        async function loadBeers() {
            const feed = document.getElementById('feed');
            feed.innerHTML = '<p style="text-align:center;">Lade Biere...</p>';
            
            const q = query(collection(db, "beers"), orderBy("timestamp", "desc"));
            const querySnapshot = await getDocs(q);
            
            let html = '';
            const selectedTheme = document.getElementById('mainThemeSelect').value;

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                if(data.theme !== selectedTheme) return;
                if(currentFilter === 'mine' && data.userId !== currentUser.uid) return;

                const gradeClass = "grade-" + Math.floor(parseFloat(data.grade));

                // Der Stift wird für den Besitzer ODER für den Admin eingeblendet!
                const canEdit = (data.userId === currentUser.uid) || isAdmin;
                const editBtnHtml = canEdit ? `<button class="edit-btn" data-id="${doc.id}" data-name="${data.name}" data-impression="${data.impression}" data-grade="${data.grade}"><i class="ph ph-pencil-simple"></i></button>` : '';

                html += `
                    <div class="beer-card">
                        <div class="beer-header">
                            <div class="beer-name">${data.name} ${editBtnHtml}</div>
                            <div class="theme-badge">${data.theme}</div>
                        </div>
                        <div class="beer-meta">
                            <span><i class="ph ph-user"></i> ${data.userName}</span>
                            <span><i class="ph ph-beer-bottle"></i> ${data.container}</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span style="color:var(--accent-blue); font-size:14px;">Eindruck: ${data.impression}/10</span>
                            <div class="beer-grade ${gradeClass}">${data.grade}</div>
                        </div>
                    </div>
                `;
            });

            feed.innerHTML = html === '' ? '<p style="text-align:center; color:#666;">Noch keine Biere für dieses Thema!</p>' : html;
        }

        document.getElementById('saveBeerBtn').addEventListener('click', async () => {
            const nameField = document.getElementById('beerName');
            const name = nameField.value.trim();
            const theme = document.getElementById('mainThemeSelect').value;
            const impression = document.getElementById('impressionSlider').value;
            const grade = document.getElementById('gradeSelect').value;

            if(!name) { 
                nameField.style.border = "2px solid var(--danger)"; 
                return; 
            }
            nameField.style.border = "1px solid #444";

            await addDoc(collection(db, "beers"), {
                name: name,
                theme: theme,
                container: selectedContainer,
                impression: impression,
                grade: grade,
                userId: currentUser.uid,
                userName: currentUser.email.split('@')[0],
                timestamp: new Date()
            });

            document.getElementById('addModal').classList.remove('active');
            nameField.value = '';
            loadBeers();
        });

        // Event-Delegation für die dynamisch erzeugten Stift-Buttons im Feed
        document.getElementById('feed').addEventListener('click', (e) => {
            const editBtn = e.target.closest('.edit-btn');
            if(editBtn) {
                const id = editBtn.getAttribute('data-id');
                const name = editBtn.getAttribute('data-name');
                const impression = editBtn.getAttribute('data-impression');
                const grade = editBtn.getAttribute('data-grade');
                
                document.getElementById('editDocId').value = id;
                document.getElementById('editBeerName').value = name;
                document.getElementById('editImpressionSlider').value = impression;
                document.getElementById('editSliderText').innerText = sliderTexts[impression] || "Kein Eindruck gewählt";
                document.getElementById('editGradeSelect').value = grade;
                
                document.getElementById('editModal').classList.add('active');
            }
        });

        document.getElementById('updateBeerBtn').addEventListener('click', async () => {
            const id = document.getElementById('editDocId').value;
            const nameField = document.getElementById('editBeerName');
            const newName = nameField.value.trim();
            const newImpression = document.getElementById('editImpressionSlider').value;
            const newGrade = document.getElementById('editGradeSelect').value;

            if(!newName) { 
                nameField.style.border = "2px solid var(--danger)"; 
                return; 
            }
            nameField.style.border = "1px solid #444";
            
            const btn = document.getElementById('updateBeerBtn');
            btn.innerHTML = '<i class="ph ph-spinner"></i> Speichere...';

            try {
                const beerRef = doc(db, "beers", id);
                await updateDoc(beerRef, {
                    name: newName,
                    impression: newImpression,
                    grade: newGrade
                });
                document.getElementById('editModal').classList.remove('active');
                loadBeers(); 
            } catch (err) {
                console.error("Fehler beim Update:", err);
            } finally {
                btn.innerHTML = '<i class="ph ph-check"></i> Aktualisieren';
            }
        });

        let deleteConfirmTimeout;
        document.getElementById('deleteBeerBtn').addEventListener('click', async (e) => {
            const btn = e.target.closest('button');
            if (btn.innerText.includes('Sicher?')) {
                const id = document.getElementById('editDocId').value;
                await deleteDoc(doc(db, "beers", id));
                document.getElementById('editModal').classList.remove('active');
                loadBeers();
                btn.innerHTML = '<i class="ph ph-trash"></i> Eintrag löschen';
                clearTimeout(deleteConfirmTimeout);
            } else {
                btn.innerHTML = '<i class="ph ph-warning"></i> Sicher? Klicke nochmal';
                deleteConfirmTimeout = setTimeout(() => {
                    btn.innerHTML = '<i class="ph ph-trash"></i> Eintrag löschen';
                }, 3000);
            }
        });

        async function loadProfile() {
            const container = document.getElementById('profileAccordionContainer');
            container.innerHTML = '<p>Lade Historie...</p>';

            const q = query(collection(db, "beers"), orderBy("timestamp", "desc"));
            const snapshot = await getDocs(q);
            
            const myBeers = [];
            snapshot.forEach(doc => {
                const data = doc.data();
                if(data.userId === currentUser.uid) myBeers.push(data);
            });

            if(myBeers.length === 0) {
                container.innerHTML = '<p>Du hast noch keine Biere bewertet.</p>';
                return;
            }

            const groupedByTheme = myBeers.reduce((acc, beer) => {
                if (!acc[beer.theme]) acc[beer.theme] = [];
                acc[beer.theme].push(beer);
                return acc;
            }, {});

            let html = '';
            for (const [themeName, beers] of Object.entries(groupedByTheme)) {
                html += `
                    <button class="accordion">${themeName} (${beers.length} Biere) <i class="ph ph-caret-down"></i></button>
                    <div class="panel">
                        <ul style="list-style:none; padding:10px 0; margin:0;">
                            ${beers.map(b => `<li style="padding:8px 0; border-bottom:1px solid #333; display:flex; justify-content:space-between;"><span>${b.name}</span><strong class="grade-${Math.floor(parseFloat(b.grade))}">${b.grade}</strong></li>`).join('')}
                        </ul>
                    </div>
                `;
            }
            container.innerHTML = html;

            const accBtns = container.querySelectorAll('.accordion');
            accBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    this.classList.toggle("active");
                    const panel = this.nextElementSibling;
                    if (panel.style.display === "block") {
                        panel.style.display = "none";
                    } else {
                        panel.style.display = "block";
                    }
                });
            });
        }

        async function calculateRanking() {
            const theme = document.getElementById('mainThemeSelect').value;
            document.getElementById('rankingThemeTitle').innerText = theme;
            const list = document.getElementById('rankingList');
            list.innerHTML = '<p style="text-align:center;">Berechne Auswertung...</p>';
            
            const q = query(collection(db, "beers"));
            const snapshot = await getDocs(q);
            
            const beers = {};
            snapshot.forEach(doc => {
                const data = doc.data();
                if(data.theme === theme) {
                    const standardName = data.name.trim().toLowerCase();
                    if(!beers[standardName]) beers[standardName] = { name: data.name, grades: [] };
                    beers[standardName].grades.push(parseFloat(data.grade));
                }
            });

            const ranked = Object.values(beers).map(b => {
                const avg = b.grades.reduce((sum, val) => sum + val, 0) / b.grades.length;
                return { name: b.name, avg: avg, count: b.grades.length };
            });

            ranked.sort((a, b) => a.avg - b.avg);

            if(ranked.length === 0) {
                list.innerHTML = '<p style="text-align:center;">Noch keine Daten für dieses Thema.</p>';
                return;
            }

            let html = '';
            const medals = ['🥇', '🥈', '🥉'];
            
            ranked.slice(0, 3).forEach((beer, index) => {
                html += `
                    <div style="background:#2a2a2a; margin-bottom:10px; padding:15px; border-radius:8px; display:flex; justify-content:space-between; align-items:center;">
                        <div style="font-size:18px;">
                            <span style="font-size:24px; margin-right:10px;">${medals[index]}</span>
                            <strong>${beer.name}</strong>
                            <div style="font-size:12px; color:#888; margin-top:5px; margin-left:40px;">Basiert auf ${beer.count} Bewertung(en)</div>
                        </div>
                        <div style="font-size:24px; font-weight:bold; color:var(--accent-blue);">
                            Ø ${beer.avg.toFixed(2)}
                        </div>
                    </div>
                `;
            });
            
            list.innerHTML = html;
        }

        document.getElementById('mainThemeSelect').addEventListener('change', loadBeers);
        
        document.getElementById('btnFilterAll').addEventListener('click', (e) => {
            currentFilter = 'all';
            e.target.classList.add('active');
            document.getElementById('btnFilterMine').classList.remove('active');
            loadBeers();
        });
        
        document.getElementById('btnFilterMine').addEventListener('click', (e) => {
            currentFilter = 'mine';
            e.target.classList.add('active');
            document.getElementById('btnFilterAll').classList.remove('active');
            loadBeers();
        });

        document.getElementById('addBeerFab').addEventListener('click', () => document.getElementById('addModal').classList.add('active'));
        document.getElementById('closeAddModal').addEventListener('click', () => document.getElementById('addModal').classList.remove('active'));
        document.getElementById('closeEditModal').addEventListener('click', () => document.getElementById('editModal').classList.remove('active'));
        
        document.getElementById('profileBtn').addEventListener('click', () => {
            loadProfile();
            document.getElementById('profileModal').classList.add('active');
        });
        document.getElementById('closeProfileModal').addEventListener('click', () => document.getElementById('profileModal').classList.remove('active'));

        document.getElementById('btnRanking').addEventListener('click', () => {
            calculateRanking();
            document.getElementById('rankingModal').classList.add('active');
        });
        document.getElementById('closeRankingModal').addEventListener('click', () => document.getElementById('rankingModal').classList.remove('active'));

    </script>
</body>
</html>
